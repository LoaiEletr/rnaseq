report_comment: >
  This report has been generated by the <a href="https://github.com/Loai3tr/comprehensive-rnaseq-pipeline"
  target="_blank">LoaiEletr/rnaseq</a> analysis pipeline. For information about how
  to interpret these results, please see the <a href="https://github.com/Loai3tr/comprehensive-rnaseq-pipeline/blob/main/docs/output.md"
  target="_blank">documentation</a>.

report_header_info:
  - Contact E-mail: "Loai.eletr65@yahoo.com"
  - Application Type: "RNA-seq"
  - Project Type: "Application"
  - Sequencing Platform: "HiSeq 2500 High Output V4"
  - Sequencing Setup: "2x125"

report_section_order:
  # Preprocessing and pre-alignment QC
  fastqc_raw:
    order: 4004
  cutadapt:
    order: 4003
  fastqc_trimmed:
    order: 4002
  bbmap/bbsplit:
    order: 4001
  # Alignment
  hisat2:
    order: 3000
  # Post-alignment QC
  samtools:
    order: 3000
  rseqc:
    order: 3000
  umitools:
    order: 3000
  # Quantification
  featurecounts:
    order: 2000
  salmon:
    order: 2000
  kallisto:
    order: 2000
  # Summaries
  "loaieletr-rnaseq-methods-description":
    order: -1000
  "software_versions":
    order: -1001
  "nf-core-rnaseq-summary-module":
    order: -1002

export_plots: true

disable_version_detection: true

# Order of modules
module_order:
  - fastqc:
      anchor: "fastqc_raw"
      name: "FastQC (raw)"
      info: "This section of the report shows FastQC results before adapter trimming."
      path_filters:
        - "*_fastqc.zip"
      path_filters_exclude:
        - "*.cutadapt*fastqc.zip"
  - fastqc:
      anchor: "fastqc_trimmed"
      name: "FastQC (trimmed)"
      info: "This section of the report shows FastQC results after adapter trimming."
      path_filters:
        - "*.cutadapt*fastqc.zip"

# Don't show % Dups in the General Stats table (we have this from Picard)
table_columns_visible:
  "FastQC (raw)":
    percent_duplicates: false
  "FastQC (trimmed)":
    percent_duplicates: false

extra_fn_clean_exts:
  - ".umi_dedup"
  - ".cutadapt"
  - "_chrX"
  - "_bam_stat"
  - ".read_distribution"
  - ".infer_experiment"
  - ".summary"
  - ".bbsplit_stats"
  - ".umi_extract"

# Customise the module search patterns to speed up execution time
#  - Skip module sub-tools that we are not interested in
#  - Replace file-content searching with filename pattern searching
#  - Don't add anything that is the same as the MultiQC default
# See https://multiqc.info/docs/#optimise-file-search-patterns for details
sp:
  cutadapt:
    fn: "*cutadapt.json"
  hisat2:
    fn: "*.hisat2.summary"
