name: "fastq_sample_seqkit_salmon"
description: |
  Subsample FASTQ reads and perform RNA-seq quantification with strandness detection.
  Performs: SeqKit subsampling of reads, Salmon transcriptome indexing, and Salmon quantification
  with automatic library strandness determination.
keywords:
  - fastq
  - subsampling
  - quantification
  - rna-seq
  - salmon
  - seqkit
  - strandness
  - transcriptomics
components:
  - seqkit/sample
  - salmon/index
  - salmon/quant
input:
  - ch_reads:
      type: file
      description: |
        Input channel containing FASTQ files (single or paired-end)
        Structure: [ val(meta), path(reads) ]
      pattern: "*.{fastq,fastq.gz,fq,fq.gz}"
  - ch_transcriptome:
      type: file
      description: |
        Channel containing transcriptome FASTA file for Salmon indexing
        Structure: [ path(transcriptome) ]
      pattern: "*.{fa,fasta,fa.gz,fasta.gz}"
  - ch_gtf:
      type: file
      description: |
        Channel containing GTF annotation file for Salmon quantification
        Structure: [ path(gtf) ]
      pattern: "*.{gtf,gtf.gz}"
output:
  - reads:
      type: file
      description: |
        Subsampled FASTQ files from SeqKit
        Structure: [ val(meta), path(reads) ]
      pattern: "*.{fastq,fastq.gz,fq,fq.gz}"
  - index:
      type: file
      description: |
        Salmon transcriptome index files
        Structure: [ path(index) ]
      pattern: "transcripts_index"
  - quant_dir:
      type: file
      description: |
        Salmon quantification directories containing results
        Structure: [ val(meta), path(quant_dir) ]
  - strandness:
      type: string
      description: |
        Detected library strandness from Salmon quantification
        Structure: [ val(meta), str(strandness) ]
  - quant_log:
      type: file
      description: |
        Log file from Salmon quantification
        Structure: [ val(meta), path(log) ]
      pattern: "*.log"
  - versions:
      type: file
      description: |
        File containing software versions from all executed modules
        Structure: [ path(versions.yml) ]
      pattern: "versions.yml"
authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
