name: "bam_sort_index_dedup_samtools_umitools_featurecounts"
description: |
  A workflow to post-process BAM files. It performs sorting, indexing,
  optional UMI deduplication, and gene-level quantification using featureCounts.
keywords:
  - bam
  - sorting
  - indexing
  - umi-deduplication
  - featurecounts
  - quantification
components:
  - samtools/sort
  - samtools/index
  - umitools/dedup
  - subread/featurecounts
input:
  - ch_bam:
      type: file
      description: |
        Input BAM file for a specific sample.
        Structure: [ val(meta), path(bam) ]
      pattern: "*.bam"
  - ch_gtf:
      type: file
      description: |
        Genome annotation file (GTF) for feature counting.
        Structure: [ val(meta), path(gtf) ]
      pattern: "*.{gtf,gtf.gz}"
  - val_with_umi:
      type: boolean
      description: Flag to enable UMI deduplication via UMI-tools.
  - val_analysis_method:
      type: list
      description: |
        List of selected downstream analysis methods (e.g., ["DEG"]).
        Used to trigger featureCounts.
output:
  - bam:
      type: file
      description: |
        Sorted and (if enabled) deduplicated BAM file.
        Structure: [ val(meta), path(bam) ]
      pattern: "*.bam"
  - bai:
      type: file
      description: |
        BAM index file associated with the output BAM.
        Structure: [ val(meta), path(bai) ]
      pattern: "*.bai"
  - edit_distance:
      type: file
      description: |
        TSV file containing UMI edit distance statistics.
        Structure: [ val(meta), path(tsv) ]
  - per_umi:
      type: file
      description: |
        TSV file containing stats per UMI.
        Structure: [ val(meta), path(tsv) ]
  - per_position:
      type: file
      description: |
        TSV file containing UMI stats per genomic position.
        Structure: [ val(meta), path(tsv) ]
  - umi_log:
      type: file
      description: |
        Log file from UMI-tools dedup.
        Structure: [ val(meta), path(log) ]
  - counts:
      type: file
      description: |
        Gene-level counts generated by featureCounts.
        Structure: [ val(meta), path(counts) ]
  - summary:
      type: file
      description: |
        Summary file from featureCounts.
        Structure: [ val(meta), path(summary) ]
authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
