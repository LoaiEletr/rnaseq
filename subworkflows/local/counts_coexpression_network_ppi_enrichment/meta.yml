name: "counts_coexpression_network_ppi_enrichment"
description: |
  Comprehensive gene network analysis workflow integrating co-expression networks (WGCNA),
  protein-protein interactions (STRING), and functional enrichment (GO/KEGG).
keywords:
  - co-expression
  - wgcna
  - ppi
  - string
  - functional-enrichment
  - go
  - kegg
  - hub-genes
components:
  - wgcna/analysis
  - qc/visualization
  - de/visualization
  - string/ppi
  - go/enrichment
  - kegg/enrichment
input:
  - ch_counts:
      type: file
      description: |
        Input channel containing gene expression count matrix.
        Structure: [ path(counts_matrix) ]
      pattern: "*.rds"
  - ch_samplesheet:
      type: file
      description: |
        Channel containing sample metadata/samplesheet.
        Structure: [ path(samplesheet) ]
      pattern: "*.{csv,tsv,txt}"
  - val_min_gs:
      type: integer
      description: Minimum number of good samples threshold for WGCNA.
  - val_min_mm:
      type: integer
      description: Minimum module membership threshold for WGCNA.
  - val_top_n_hubgenes:
      type: integer
      description: Number of top hub genes to extract per module.
  - val_top_n_processes:
      type: integer
      description: Number of top biological processes to visualize in enrichment results.
  - val_cor_threshold:
      type: float
      description: Correlation threshold for adjacency matrix construction in WGCNA.
  - val_pval_threshold:
      type: float
      description: P-value threshold for statistical significance.
  - val_tomtype:
      type: string
      description: |
        TOM (Topological Overlap Matrix) type for WGCNA.
        Structure: [ "none" | "signed" | "signed 2" | "unsigned" | "unsigned 2" | "signed Nowick" | "signed Nowick 2" ]
  - val_networktype:
      type: string
      description: |
        Network type for WGCNA.
        Structure: [ "signed" | "unsigned" | "signed hybrid" ]
  - val_deepsplit:
      type: integer
      description: Deep split level for dendrogram cutting in WGCNA (0-4).
  - val_reassignthreshold:
      type: float
      description: Reassignment threshold for module merging in WGCNA.
  - val_mergecutheight:
      type: float
      description: Merge cut height for dendrogram in WGCNA.
  - val_minmodulesize:
      type: integer
      description: Minimum module size for WGCNA.
  - val_sft_r2_threshold:
      type: float
      description: R² threshold for scale-free topology fit.
  - val_species_name:
      type: string
      description: |
        Species name for PPI network and enrichment analyses.
        Structure: [ "human" | "mouse" | "rat" | "yeast" | "fruitfly" | "zebrafish" | "worm" | "arabidopsis" | "chicken" | "cow" | "pig" | "dog" | "monkey" ]
  - val_score_threshold:
      type: integer
      description: STRING PPI confidence score threshold (0-1000).
  - val_enrichment_method:
      type: string
      description: |
        Enrichment method(s) to perform.
        Structure: [ "GO" | "KEGG" | "GO,KEGG" ]
output:
  - wgcna_results:
      type: directory
      description: |
        WGCNA results including modules, eigengenes, and hub genes.
        Structure: [ path(wgcna_results) ]
  - ppi_results:
      type: directory
      description: |
        STRING protein-protein interaction network analysis results.
        Structure: [ path(ppi_results) ]
  - qc_plots:
      type: directory
      description: |
        Quality control visualization plots (PCA, sample clustering, etc.).
        Structure: [ path(qc_plots) ]
  - heatmap_plots:
      type: directory
      description: |
        Heatmap visualizations of hub genes and module expression patterns.
        Structure: [ path(heatmaps) ]
  - go_enrichment:
      type: directory
      description: |
        GO enrichment analysis results.
        Structure: [ path(go_results) ]
  - kegg_enrichment:
      type: directory
      description: |
        KEGG pathway enrichment analysis results.
        Structure: [ path(kegg_results) ]
authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
