name: "bam_dexseq_deu_enrichment"
description: |
  Differential exon usage (DEU) analysis workflow.
  Performs exon-level counting from BAM files, differential analysis with DEXSeq,
  and optional GO/KEGG functional enrichment of significant genes.
keywords:
  - dexseq
  - differential-exon-usage
  - alternative-splicing
  - exon-counting
  - rna-seq
  - functional-enrichment
components:
  - dexseq/count
  - dexseq/deu
  - go/enrichment
  - kegg/enrichment
input:
  - ch_bam:
      type: file
      description: |
        Input channel containing BAM files.
        Structure: [ val(meta), path(bam) ]
      pattern: "*.{bam,bam.gz}"
  - ch_gff:
      type: file
      description: |
        GTF/GFF annotation file prepared specifically for DEXSeq.
        Structure: [ val(meta), path(gff) ]
      pattern: "*.{gff,gff.gz}"
  - ch_samplesheet:
      type: file
      description: |
        Sample metadata/samplesheet for experimental design.
        Structure: [ path(samplesheet) ]
      pattern: "*.{csv,tsv,txt}"
  - val_alignment_quality:
      type: integer
      description: Minimum MAPQ score for read counting.
  - val_pval_threshold:
      type: float
      description: P-value threshold for significance.
  - val_logfc_threshold:
      type: float
      description: Log fold change (or fold change) threshold for DEU.
  - val_top_n:
      type: integer
      description: Number of top significant genes/exons to visualize.
  - val_min_exonlength:
      type: integer
      description: Minimum exon length (bp) for consideration.
  - val_species_name:
      type: string
      description: |
        Species name for enrichment analysis.
        Structure: [ "human" | "mouse" | "rat" | "yeast" | "fruitfly" | "zebrafish" | "worm" | "arabidopsis" | "chicken" | "cow" | "pig" | "dog" | "monkey" ]
  - val_ntop_processes:
      type: integer
      description: Number of top biological pathways/processes to visualize.
  - val_enrichment_method:
      type: string
      description: |
        Enrichment method(s) to perform.
        Structure: [ "GO" | "KEGG" | "GO,KEGG" ]
output:
  - dexseq_table:
      type: file
      description: Full results table from DEXSeq analysis.
      Structure: [path(results_table)]
  - dexseq_sigtable:
      type: file
      description: Filtered significant differential exon usage results.
      Structure: [path(significant_results)]
  - ma_plot:
      type: file
      description: MA plot of exon usage.
      Structure: [path(ma_plot)]
  - deu_plots:
      type: directory
      description: Directory of gene-level plots showing exon usage per condition.
      Structure: [path(gene_plots)]
  - significant_genes:
      type: file
      description: RDS file containing IDs of genes with significant DEU.
      Structure: [path(significant_genes)]
  - report:
      type: directory
      description: HTML report directory generated by DEXSeq.
      Structure: [path(report)]
  - go_enrichment:
      type: directory
      description: GO enrichment results for DEU genes.
      Structure: [path(go_results)]
  - kegg_enrichment:
      type: directory
      description: KEGG enrichment results for DEU genes.
      Structure: [path(kegg_results)]
authors:
  - "@LoaiEletr"
maintainers:
  - "@LoaiEletr"
