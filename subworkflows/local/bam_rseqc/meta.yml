name: "bam_rseqc"
description: |
  Comprehensive BAM quality control suite using RSeQC.
  Supports selective execution of modules including strandness inference,
  read distribution, junction annotation, and Transcript Integrity Number (TIN).
keywords:
  - rseqc
  - quality-control
  - bam
  - rna-seq
  - gene-body-coverage
  - strandness
components:
  - rseqc/bamstat
  - rseqc/genebodycoverage
  - rseqc/inferexperiment
  - rseqc/innerdistance
  - rseqc/junctionannotation
  - rseqc/readdistribution
  - rseqc/readduplication
  - rseqc/tin
input:
  - val_rseqc_modules:
      type: list
      description: |
        List of modules to run (e.g., ['tin', 'read_distribution']).
  - ch_bam:
      type: file
      description: |
        Input BAM files.
        Structure: [ val(meta), path(bam) ]
      pattern: "*.{bam,bam.gz}"
  - ch_bed:
      type: file
      description: |
        BED annotation file.
        Structure: [ path(bed) ]
      pattern: "*.bed"
  - ch_bai:
      type: file
      description: |
        BAM index files. Required for 'tin' and 'genebody_coverage'.
        Structure: [ val(meta), path(bai) ]
      pattern: "*.bai"
output:
  - bamstat:
      type: file
      description: Statistics of the alignment file (read counts, mapping quality).
      Structure: [val(meta), path(txt)]
      pattern: "*.bam_stat.txt"
  - genebodycoverage_r:
      type: file
      description: R script to generate gene body coverage plots.
      Structure: [val(meta), path(rscript)]
      pattern: "*.geneBodyCoverage.r"
  - genebodycoverage_curves:
      type: file
      description: PDF showing gene body coverage curves.
      Structure: [val(meta), path(pdf)]
      pattern: "*.geneBodyCoverage.curves.pdf"
  - genebodycoverage_heatmap:
      type: file
      description: PDF heatmap of gene body coverage.
      Structure: [val(meta), path(pdf)]
      pattern: "*.geneBodyCoverage.heatmap.pdf"
  - genebodycoverage_txt:
      type: file
      description: Raw data for gene body coverage percentages.
      Structure: [val(meta), path(txt)]
      pattern: "*.geneBodyCoverage.txt"
  - genebodycoverage_log:
      type: file
      description: Execution logs for gene body coverage.
      Structure: [val(meta), path(log)]
      pattern: "*.log"
  - inferexperiment:
      type: file
      description: Report on strandness/experiment orientation.
      Structure: [val(meta), path(txt)]
      pattern: "*.infer_experiment.txt"
  - innerdistance_distance:
      type: file
      description: Inner distance between mate pairs data.
      Structure: [val(meta), path(distance)]
      pattern: "*.inner_distance.txt"
  - innerdistance_freq:
      type: file
      description: Frequency data for inner distances.
      Structure: [val(meta), path(freq)]
      pattern: "*.inner_distance_freq.txt"
  - innerdistance_pdf:
      type: file
      description: PDF plot of inner distance distribution.
      Structure: [val(meta), path(pdf)]
      pattern: "*.inner_distance_plot.pdf"
  - innerdistance_r:
      type: file
      description: R script for inner distance plotting.
      Structure: [val(meta), path(rscript)]
      pattern: "*.inner_distance_plot.r"
  - junctionannotation_xls:
      type: file
      description: Splicing junction details in Excel format.
      Structure: [val(meta), path(xls)]
      pattern: "*.junction_annotation.xls"
  - junctionannotation_log:
      type: file
      description: Logs for junction annotation analysis.
      Structure: [val(meta), path(log)]
      pattern: "*.junction_annotation.log"
  - junctionannotation_r:
      type: file
      description: R script for junction annotation plots.
      Structure: [val(meta), path(rscript)]
      pattern: "*.junction_plot.r"
  - junctionannotation_bed:
      type: file
      description: Identified junctions in BED format.
      Structure: [val(meta), path(junction_bed)]
      pattern: "*.junction.bed"
  - junctionannotation_interact:
      type: file
      description: Junctions in Interaction BED format for browsers.
      Structure: [val(meta), path(interact_bed)]
      pattern: "*.interact.bed"
  - junctionannotation_pdf:
      type: file
      description: Splicing junction classification plot.
      Structure: [val(meta), path(junction_pdf)]
      pattern: "*.junction_plot.pdf"
  - junctionannotation_events_pdf:
      type: file
      description: Alternative splicing events plot.
      Structure: [val(meta), path(events_pdf)]
      pattern: "*.events.pdf"
  - readdistribution:
      type: file
      description: Distribution of reads across exons, introns, etc.
      Structure: [val(meta), path(txt)]
      pattern: "*.read_distribution.txt"
  - readduplication_pdf:
      type: file
      description: Plots showing duplication levels.
      Structure: [val(meta), path(pdf)]
      pattern: "*.read_duplication.pdf"
  - readduplication_r:
      type: file
      description: R script for read duplication plots.
      Structure: [val(meta), path(rscript)]
      pattern: "*.read_duplication.r"
  - readduplication_seq:
      type: file
      description: Sequence-based duplication rate data.
      Structure: [val(meta), path(seq_duplicaterate)]
      pattern: "*.seq.dup.rate.xls"
  - readduplication_pos:
      type: file
      description: Position-based duplication rate data.
      Structure: [val(meta), path(pos_duplicaterate)]
      pattern: "*.pos.dup.rate.xls"
  - tin_txt:
      type: file
      description: Transcript Integrity Number (TIN) scores (text).
      Structure: [val(meta), path(txt)]
      pattern: "*.tin.txt"
  - tin_xls:
      type: file
      description: TIN scores in Excel format.
      Structure: [val(meta), path(xls)]
      pattern: "*.tin.xls"
authors:
  - "@LoaiEletr"
maintainers:
  - "@LoaiEletr"
