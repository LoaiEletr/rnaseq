name: "bam_dedup_recalibrate_picard_gatk"
description: |
  A subworkflow for RNA-seq post-alignment processing.
  Includes duplicate marking (Picard), splitting reads spanning introns (GATK4 SplitNCigarReads),
  and Base Quality Score Recalibration (GATK4 BQSR).
keywords:
  - rnaseq
  - markduplicates
  - splitncigarreads
  - bqsr
  - gatk4
  - picard
components:
  - picard/markduplicates
  - gatk4/splitncigarreads
  - samtools/merge
  - samtools/index
  - gatk4/baserecalibrator
  - gatk4/applybqsr

input:
  - ch_bam:
      type: file
      description: |
        The input BAM files to be processed.
        Structure: [ val(meta), [ bam ] ]
      pattern: "*.bam"
  - ch_bai:
      type: file
      description: |
        The input BAM index files.
        Structure: [ val(meta), [ bai ] ]
      pattern: "*.bai"
  - ch_fasta:
      type: file
      description: |
        The reference FASTA file.
        Structure: [ val(meta), [ fasta ] ]
      pattern: "*.{fasta,fa}"
  - ch_fai:
      type: file
      description: |
        The index for the reference FASTA.
        Structure: [ val(meta), [ fai ] ]
      pattern: "*.fai"
  - ch_dict:
      type: file
      description: |
        The sequence dictionary for the reference FASTA.
        Structure: [ val(meta), [ dict ] ]
      pattern: "*.dict"
  - ch_intervals:
      type: file
      description: |
        Genomic intervals (BED or Interval List) to restrict processing.
        Structure: [ val(meta), [ intervals ] ]
      pattern: "*.{bed,interval_list}"
  - ch_known_sites:
      type: file
      description: |
        VCF files containing known polymorphic sites (e.g., dbSNP) for BQSR.
        Structure: [ val(meta), [ vcf ] ]
      pattern: "*.vcf.gz"
  - ch_known_sites_tbi:
      type: file
      description: |
        Index files for the known sites VCFs.
        Structure: [ val(meta), [ tbi ] ]
      pattern: "*.tbi"
  - skip_picard_markduplicates:
      type: boolean
      description: Toggle to skip Picard MarkDuplicates.
  - skip_baserecalibration:
      type: boolean
      description: Toggle to skip GATK4 Base Quality Score Recalibration.

output:
  - bam:
      type: file
      description: |
        Processed BAM files (deduplicated, split, and/or recalibrated).
        Structure: [ val(meta), [ bam ] ]
      pattern: "*.bam"
  - bai:
      type: file
      description: |
        Index files for the processed BAM files.
        Structure: [ val(meta), [ bai ] ]
      pattern: "*.bai"
  - picard_metrics:
      type: file
      description: |
        Duplicate metrics generated by Picard MarkDuplicates.
        Structure: [ val(meta), [ metrics ] ]
      pattern: "*.metrics.txt"
  - recalibrate_table:
      type: file
      description: |
        Recalibration table generated by GATK4 BaseRecalibrator.
        Structure: [ val(meta), [ table ] ]
      pattern: "*.table"
authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
