name: "prepare_genome"
description: |
  A comprehensive reference preparation subworkflow. It manages the decompression of
  various genome/annotation formats and builds indices for multiple tools including
  HISAT2, Salmon, Kallisto, SortMeRNA, BBSplit, and GATK4.
keywords:
  - reference
  - indexing
  - genome
  - transcriptome
  - rna-seq
  - variant-calling
components:
  - gunzip
  - untar
  - gxf2bed
  - kallisto/index
  - salmon/index
  - hisat2/extractexons
  - hisat2/extractsplicesites
  - hisat2/build
  - sortmerna
  - bbmap/bbsplit
  - dexseq/prepareannotation
  - samtools/faidx
  - snpeff/download
  - gatk4/createsequencedictionary
  - gatk4/bedtointervallist
  - gatk4/intervallisttools
input:
  - val_fasta:
      type: string
      description: Path to reference genome FASTA file.
  - val_transcriptome:
      type: string
      description: Path to transcriptome FASTA file.
  - val_gtf:
      type: string
      description: Path to gene annotation GTF file.
  - val_gtf_isoform:
      type: string
      description: Path to extended GTF file for isoform analysis.
  - val_bed:
      type: string
      description: Path to BED annotation file.
  - val_gff:
      type: string
      description: Path to GFF annotation file (DEXSeq format).
  - val_contaminant_fasta:
      type: string
      description: Path to contaminant genome FASTA for BBSplit.
  - val_rrna_db:
      type: string
      description: Path to rRNA database file (.tar.gz).
  - val_rrna_db_type:
      type: string
      description: SortMeRNA mode ('default', 'fast', or 'sensitive').
  - val_aggregation:
      type: boolean
      description: DEXSeq aggregation method for exon counting.
  - val_bbsplit_index:
      type: string
      description: Path to BBSplit index (folder or archive).
  - val_sortmerna_index:
      type: string
      description: Path to SortMeRNA index (folder or archive).
  - val_hisat2_index:
      type: string
      description: Path to HISAT2 index (folder or archive).
  - val_kallisto_index:
      type: string
      description: Path to Kallisto index file (.idx).
  - val_salmon_index:
      type: string
      description: Path to Salmon index (folder or archive).
  - val_fai:
      type: string
      description: Path to SAMtools FASTA index (.fai).
  - val_dict:
      type: string
      description: Path to GATK sequence dictionary (.dict).
  - val_intervallist:
      type: string
      description: Path to GATK interval list.
  - val_snpeff_db:
      type: string
      description: Path to SnpEff database.
  - val_snpeff_genome:
      type: string
      description: SnpEff genome version (e.g., 'GRCh38.105').
output:
  - fasta_compressed:
      type: file
      description: Input FASTA as provided.
      Structure: [val(meta), path(fasta)]
  - fasta_uncompressed:
      type: file
      description: Uncompressed reference FASTA.
      Structure: [val(meta), path(fasta)]
  - transcriptome:
      type: file
      description: Transcriptome FASTA.
      Structure: [val(meta), path(fasta)]
  - gtf_compressed:
      type: file
      description: Input GTF as provided.
      Structure: [val(meta), path(gtf)]
  - gtf_uncompressed:
      type: file
      description: Uncompressed GTF file.
      Structure: [val(meta), path(gtf)]
  - gtf_isoform:
      type: file
      description: GTF for isoform analysis.
      Structure: [val(meta), path(gtf)]
  - contaminant_fasta:
      type: file
      description: Contaminant FASTA for BBSplit.
      Structure: [val(meta), path(fasta)]
  - rrna_db_fasta:
      type: file
      description: rRNA database sequences.
      Structure: [val(meta), path(fasta)]
  - bed:
      type: file
      description: BED annotation file.
      Structure: [val(meta), path(bed)]
  - gff:
      type: file
      description: Prepared GFF for DEXSeq.
      Structure: [val(meta), path(gff)]
  - fai:
      type: file
      description: FASTA index file.
      Structure: [val(meta), path(fai)]
  - dict:
      type: file
      description: Sequence dictionary file.
      Structure: [val(meta), path(dict)]
  - intervallist:
      type: file
      description: GATK interval list.
      Structure: [val(meta), path(interval_list)]
  - intervals_split:
      type: file
      description: Split interval lists for parallelization.
      Structure: [val(meta), path(interval_list)]
  - snpeff_db:
      type: file
      description: SnpEff database cache.
      Structure: [val(meta), path(snpeff_db)]
  - hisat2_index:
      type: file
      description: HISAT2 index files.
      Structure: [val(meta), path(hisat2_index)]
  - kallisto_index:
      type: file
      description: Kallisto index file.
      Structure: [val(meta), path(kallisto_index)]
  - salmon_index:
      type: file
      description: Salmon index files.
      Structure: [val(meta), path(salmon_index)]
  - sortmerna_index:
      type: file
      description: SortMeRNA index files.
      Structure: [val(meta), path(sortmerna_index)]
  - bbsplit_index:
      type: file
      description: BBSplit index files.
      Structure: [val(meta), path(bbsplit_index)]
authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
