name: "fastq_quant_pseudoalignment"
description: |
  Flexible RNA-seq quantification workflow supporting both Kallisto and Salmon pseudoaligners.
  Performs transcriptome quantification with user-selected pseudoalignment method.
  Automatically handles method-specific parameters and outputs.
keywords:
  - pseudoalignment
  - quantification
  - rna-seq
  - kallisto
  - salmon
  - transcriptomics
  - transcriptome
components:
  - kallisto/quant
  - salmon/quant
input:
  - ch_reads:
      type: file
      description: |
        Input channel containing FASTQ files (single or paired-end)
        Structure: [ val(meta), path(reads) ]
      pattern: "*.{fastq,fastq.gz,fq,fq.gz}"
  - ch_kallisto_index:
      type: file
      description: |
        Channel containing kallisto index files
        Structure: [ path(kallisto_index) ]
      pattern: "*"
  - ch_salmon_index:
      type: file
      description: |
        Channel containing salmon index files
        Structure: [ path(salmon_index) ]
      pattern: "*"
  - ch_gtf:
      type: file
      description: |
        Channel containing GTF annotation file for quantification
        Structure: [ path(gtf) ]
      pattern: "*.{gtf,gtf.gz}"
  - val_bootstrap_count:
      type: integer
      description: |
        Number of bootstrap samples for Kallisto quantification
        Structure: integer
  - val_fragment_length:
      type: integer
      description: |
        Average fragment length for Kallisto (single-end mode)
        Structure: integer
  - val_fragment_length_sd:
      type: integer
      description: |
        Fragment length standard deviation for Kallisto (single-end mode)
        Structure: integer
  - val_pseudoaligner_method:
      type: string
      description: |
        Pseudoalignment method to use: 'kallisto' or 'salmon'
        Structure: [ "kallisto" | "salmon" ]
output:
  - quant_dir:
      type: file
      description: |
        Quantification output directories containing results
        Structure: [ val(meta), path(quant_dir) ]
      pattern: "*"
  - json_info:
      type: file
      description: |
        JSON info files from Kallisto quantification (only when method='kallisto')
        Structure: [ val(meta), path(json_info) ]
      pattern: "*.json"
  - quant_log:
      type: file
      description: |
        Log files from quantification (Kallisto or Salmon)
        Structure: [ val(meta), path(quant_log) ]
      pattern: "*.log"
  - versions:
      type: file
      description: |
        File containing software versions from executed modules
        Structure: [ path(versions.yml) ]
      pattern: "versions.yml"
authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
