name: bedtools_sort
description: |
  Sorts BED files using bedtools sort command.
keywords:
  - bed
  - sorting
tools:
  - bedtools:
      description: "A powerful toolset for genome arithmetic"
      homepage: "https://bedtools.readthedocs.io/"
      documentation: "https://bedtools.readthedocs.io/"
      tool_dev_url: "https://github.com/arq5x/bedtools2"
      licence: ["MIT"]
      identifier: "bedtools"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - bed:
        type: file
        description: Input BED file to be sorted
        pattern: "*.{bed,bed.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_3003" # BED

output:
  bed:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.sorted.bed":
          type: file
          description: Sorted BED file
          pattern: "*.sorted.bed"
          ontologies:
            - edam: "http://edamontology.org/format_3003" # BED
  versions_bedtools:
    - - "${task.process}":
          type: string
          description: The name of the process
      - bedtools:
          type: string
          description: The name of the tool
      - "bedtools --version | sed 's/.*tools v//'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - bedtools:
          type: string
          description: The name of the tool
      - "bedtools --version | sed 's/.*tools v//'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
