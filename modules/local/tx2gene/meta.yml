name: "tx2gene"
description: |
  Generates a transcript-to-gene mapping file (tx2gene) for various species using biomaRt.
  This is essential for summarizing transcript-level quantification to gene-level counts.
keywords:
  - biomart
  - transcript
  - gene
  - mapping
  - annotation
tools:
  - bioconductor_biomart:
      description: "Interface to BioMart databases (e.g. Ensembl) for gene/transcript annotation"
      homepage: "https://bioconductor.org/packages/biomaRt/"
      documentation: "https://bioconductor.org/packages/release/bioc/html/biomaRt.html"
      tool_dev_url: "https://github.com/grimbough/biomaRt"
      doi: "10.1038/nprot.2009.97"
      licence: ["Artistic-2.0"]
      identifier: "biomaRt"

input:
  - - species_name:
        type: string
        description: Species name for fetching the correct BioMart dataset (e.g., "human", "mouse").
        pattern: "human|mouse|rat|yeast|fruitfly|zebrafish|worm|arabidopsis|chicken|cow|pig|dog|monkey"
        ontologies: []

output:
  tsv:
    - "*.tsv":
        type: file
        description: TSV file containing transcript IDs and their corresponding gene IDs/names.
        pattern: "*.tsv"
        ontologies:
          - edam: "http://edamontology.org/format_3475" # TSV
  versions_rbase:
    - - "${task.process}":
          type: string
          description: The name of the process
      - r-base:
          type: string
      - "Rscript -e 'cat(as.character(getRversion()))'":
          type: eval
  versions_biomart:
    - - "${task.process}":
          type: string
      - bioconductor-biomart:
          type: string
      - 'Rscript -e "cat(as.character(packageVersion(''biomaRt'')))"':
          type: eval

topics:
  versions:
    - - "${task.process}":
          type: string
      - r-base:
          type: string
      - "Rscript -e 'cat(as.character(getRversion()))'":
          type: eval
    - - "${task.process}":
          type: string
      - bioconductor-biomart:
          type: string
      - 'Rscript -e "cat(as.character(packageVersion(''biomaRt'')))"':
          type: eval

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
