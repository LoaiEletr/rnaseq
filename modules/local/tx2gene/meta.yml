name: tx2gene
description: |
  Generates transcript-to-gene mapping file (tx2gene) for various species using biomaRt.
keywords:
  - biomart
  - transcript
  - gene
  - mapping
tools:
  - bioconductor_biomart:
      description: "Interface to BioMart databases for gene/transcript annotation"
      homepage: "https://bioconductor.org/packages/biomaRt/"
      documentation: "https://bioconductor.org/packages/release/bioc/html/biomaRt.html"
      tool_dev_url: "https://github.com/grimbough/biomaRt"
      licence: ["Artistic-2.0"]
      identifier: "biomaRt"

input:
  - species_name:
      type: string
      description: |
        Species name for transcript-to-gene mapping
        Supported species: human, mouse, rat, yeast, fruitfly, zebrafish, worm, arabidopsis, chicken, cow, pig, dog, monkey
      pattern: "human|mouse|rat|yeast|fruitfly|zebrafish|worm|arabidopsis|chicken|cow|pig|dog|monkey"

output:
  tsv:
    - "*.tsv":
        type: file
        description: |
          TSV file with transcript-to-gene mapping
        pattern: "*.tsv"
        ontologies:
          - edam: "http://edamontology.org/format_3475"

  versions_biomart:
    - - "${task.process}":
          type: string
          description: The name of the process
      - r_base:
          type: string
          description: The name of R programming language
      - "echo $(R --version 2>&1) | sed 's/^.*R version //; s/ .*$//'":
          type: eval
          description: The expression to obtain the version of R
      - bioconductor_biomart:
          type: string
          description: The name of the BioMart package
      - 'Rscript -e "library(biomaRt); cat(as.character(packageVersion(''biomaRt'')))"':
          type: eval
          description: The expression to obtain the version of BioMart

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - r_base:
          type: string
          description: The name of R programming language
      - "echo $(R --version 2>&1) | sed 's/^.*R version //; s/ .*$//'":
          type: eval
          description: The expression to obtain the version of R
      - bioconductor_biomart:
          type: string
          description: The name of the BioMart package
      - 'Rscript -e "library(biomaRt); cat(as.character(packageVersion(''biomaRt'')))"':
          type: eval
          description: The expression to obtain the version of BioMart

