name: seqkit_stats
description: |
  Calculates average read length from FASTQ files using seqkit stats.
  The value is rounded to the nearest integer and exported as an environment variable.
keywords:
  - seqkit
  - statistics
  - read length
  - fastq
  - quality control
tools:
  - seqkit:
      description: "A cross-platform and ultrafast toolkit for FASTA/Q file manipulation"
      homepage: "https://bioinf.shenwei.me/seqkit/"
      documentation: "https://bioinf.shenwei.me/seqkit/usage/"
      tool_dev_url: "https://github.com/shenwei356/seqkit"
      doi: "10.1371/journal.pone.0163962"
      licence: ["MIT"]
      identifier: "seqkit"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - reads:
        type: file
        description: |
          Input FASTQ file(s) for read length calculation.
          For paired-end data, only the first read file is typically used for length inference.
        pattern: "*.{fastq,fq,fastq.gz,fq.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_1930" # FASTQ

output:
  avg_length:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - AVG_READLENGTH:
          type: string
          description: Average read length extracted from seqkit stats (rounded to nearest integer)
          ontologies: []
  versions_seqkit:
    - - "${task.process}":
          type: string
          description: The name of the process
      - seqkit:
          type: string
          description: The name of the tool
      - "seqkit version | sed 's/seqkit v//'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - seqkit:
          type: string
          description: The name of the tool
      - "seqkit version | sed 's/seqkit v//'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
