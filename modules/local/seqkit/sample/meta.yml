name: seqkit_sample
description: |
  Subsamples FASTQ files to a specific number of reads (default: 1 million) using SeqKit.
  Uses a fixed seed to ensure reproducibility in paired-end subsampling.
keywords:
  - seqkit
  - subsample
  - fastq
  - downsample
tools:
  - seqkit:
      description: "A cross-platform and ultrafast toolkit for FASTA/Q file manipulation"
      homepage: "https://bioinf.shenwei.me/seqkit/"
      documentation: "https://bioinf.shenwei.me/seqkit/usage/"
      tool_dev_url: "https://github.com/shenwei356/seqkit"
      doi: "10.1371/journal.pone.0163962"
      licence: ["MIT"]
      identifier: "seqkit"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - reads:
        type: file
        description: |
          Input FASTQ file(s) to subsample.
          Single file for single-end, list of two files for paired-end data.
        pattern: "*.{fastq,fq,fastq.gz,fq.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_1930" # FASTQ

output:
  reads:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*_1M.fastq.gz":
          type: file
          description: Subsampled FASTQ files containing 1 million reads.
          pattern: "*_1M.fastq.gz"
          ontologies:
            - edam: "http://edamontology.org/format_1930" # FASTQ
  versions_seqkit:
    - - "${task.process}":
          type: string
          description: The name of the process
      - seqkit:
          type: string
          description: The name of the tool
      - "seqkit version | sed 's/seqkit v//'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - seqkit:
          type: string
          description: The name of the tool
      - "seqkit version | sed 's/seqkit v//'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@LoaiEletr"
maintainers:
  - "@LoaiEletr"
