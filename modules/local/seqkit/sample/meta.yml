name: seqkit_sample
description: |
  Subsamples FASTQ files to 1 million reads using seqkit.
keywords:
  - seqkit
  - subsample
  - fastq
tools:
  - seqkit:
      description: "A cross-platform and ultrafast toolkit for FASTA/Q file manipulation"
      homepage: "https://bioinf.shenwei.me/seqkit/"
      documentation: "https://bioinf.shenwei.me/seqkit/usage/"
      tool_dev_url: "https://github.com/shenwei356/seqkit"
      licence: ["MIT"]
      identifier: "seqkit"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - reads:
        type: file
        description: |
          Input FASTQ file(s) to subsample
          Single file for single-end, two files for paired-end data
        pattern: "*.{fastq,fq,fastq.gz,fq.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_1930"

output:
  reads:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*_1M.fastq.gz":
          type: file
          description: |
            Subsampled FASTQ files (1 million reads each)
            Single file for single-end, two files for paired-end data
          pattern: "*_1M.fastq.gz"
          ontologies:
            - edam: "http://edamontology.org/format_1930"

  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*.log":
          type: file
          description: |
            Log file from seqkit subsampling
          pattern: "*.log"
          ontologies:
            - edam: "http://edamontology.org/data_1678"

  versions_seqkit:
    - - "${task.process}":
          type: string
          description: The name of the process
      - seqkit:
          type: string
          description: The name of the tool
      - "seqkit version | sed 's/seqkit v//'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - seqkit:
          type: string
          description: The name of the tool
      - "seqkit version | sed 's/seqkit v//'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
