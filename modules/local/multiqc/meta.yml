name: "multiqc"
description: |
  Aggregates results from bioinformatics analyses across many samples into a single report.
  MultiQC searches a given directory for analysis logs and compiles a HTML report.
keywords:
  - quality control
  - qc
  - report
  - visualization
  - summary
tools:
  - multiqc:
      description: "Aggregate results from bioinformatics analyses across many samples into a single report"
      homepage: "https://multiqc.info/"
      documentation: "https://multiqc.info/docs/"
      tool_dev_url: "https://github.com/ewels/MultiQC"
      doi: "10.1093/bioinformatics/btw354"
      licence: ["GPL-3.0-or-later"]
      identifier: "MultiQC"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'all_samples' ]`
    - multiqc_files:
        type: file
        description: |
          Directory or files containing analysis outputs from various tools for MultiQC to parse
        pattern: "*"
        ontologies: []
  - - meta2:
        type: map
        description: |
          Groovy Map containing config information
    - multiqc_config:
        type: file
        description: Optional config yml for MultiQC
        pattern: "*.{yml,yaml}"
        ontologies:
          - edam: "http://edamontology.org/format_3750" # YAML

output:
  report:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.html":
          type: file
          description: HTML report summarizing quality control metrics
          pattern: "*.html"
          ontologies:
            - edam: "http://edamontology.org/format_2331" # HTML
  data:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*_data":
          type: directory
          description: Directory containing parsed data from MultiQC
          pattern: "*_data"
          ontologies: []
  plots:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*_plots":
          type: directory
          description: Directory containing individual plots generated by MultiQC
          pattern: "*_plots"
          ontologies: []
  versions_multiqc:
    - - "${task.process}":
          type: string
          description: The name of the process
      - multiqc:
          type: string
          description: The name of the tool
      - "multiqc --version | sed 's/.*version //'":
          type: eval
          description: The expression to obtain the version of MultiQC

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - multiqc:
          type: string
          description: The name of the tool
      - "multiqc --version | sed 's/.*version //'":
          type: eval
          description: The expression to obtain the version of MultiQC

authors:
  - "@LoaiEletr"
maintainers:
  - "@LoaiEletr"
