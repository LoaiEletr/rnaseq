name: rmats
description: |
  Detects differential alternative splicing events from RNA-Seq data using rMATS.
keywords:
  - rmats
  - splicing
  - alternative splicing
  - differential analysis
tools:
  - rmats:
      description: "rMATS - replicate multivariate analysis of transcript splicing"
      homepage: "https://github.com/Xinglab/rmats"
      documentation: "https://github.com/Xinglab/rmats"
      tool_dev_url: "https://github.com/Xinglab/rmats"
      licence: ["MIT"]
      identifier: "rmats"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false, lib_type:'RF' ]`
    - bam_files:
        type: file
        description: |
          BAM files for rMATS analysis
        pattern: "*.{bam,bam.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_2572"

  - bam_list:
      type: file
      description: |
        Text files listing BAM files for two conditions
      pattern: "*.{txt}"

  - gtf:
      type: file
      description: |
        GTF annotation file
      pattern: "*.{gtf,gtf.gz}"
      ontologies:
        - edam: "http://edamontology.org/format_2306"

  - mode:
      type: string
      description: |
        rMATS run mode: 'prep' or 'post'
      pattern: "prep|post"

  - avg_length:
      type: integer
      description: |
        Average read length
      pattern: "[0-9]+"

  - statoff:
      type: boolean
      description: |
        Turn off statistical analysis
      pattern: "true|false"

  - novelss:
      type: boolean
      description: |
        Enable novel splice site detection
      pattern: "true|false"

  - allowclipping:
      type: boolean
      description: |
        Allow reads with soft/hard clipping
      pattern: "true|false"

  - individualcounts:
      type: boolean
      description: |
        Output individual read counts per sample
      pattern: "true|false"

  - rmats_prep_tmp_dir:
      type: file
      description: |
        Temporary directory from prep mode for post mode
      pattern: "*"

output:
  post_output:
    - rmats_post_output:
        type: file
        description: |
          Directory containing rMATS post-processing results
        pattern: "rmats_post_output/*"

  prep_tmp:
    - rmats_prep_tmp:
        type: file
        description: |
          Temporary directory from prep mode
        pattern: "rmats_prep_tmp/*"

  prep_output:
    - rmats_prep_output:
        type: file
        description: |
          Directory containing rMATS prep mode results
        pattern: "rmats_prep_output/*"

  versions_rmats:
    - - "${task.process}":
          type: string
          description: The name of the process
      - rmats:
          type: string
          description: The name of the tool
      - "rmats.py --version | sed 's/v//'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - rmats:
          type: string
          description: The name of the tool
      - "rmats.py --version | sed 's/v//'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
