name: masigpro_timecourse
description: |
  Performs time-course differential expression analysis using maSigPro for identifying significant temporal expression patterns.
keywords:
  - masigpro
  - time course
  - differential expression
  - temporal analysis
tools:
  - bioconductor_masigpro:
      description: "Significant Gene Expression Profile Differences in Time Course Gene Expression Data"
      homepage: "https://bioconductor.org/packages/maSigPro/"
      documentation: "https://bioconductor.org/packages/release/bioc/html/maSigPro.html"
      tool_dev_url: "https://github.com/b2slab/maSigPro"
      licence: ["GPL-2.0-only"]
      identifier: "maSigPro"

input:
  - count_matrix_rds:
      type: file
      description: |
        RDS file containing raw count matrix
      pattern: "*.rds"
      ontologies: []

  - samplesheet_csv:
      type: file
      description: |
        CSV file with sample metadata including time points and experimental groups
      pattern: "*.csv"
      ontologies:
        - edam: "http://edamontology.org/format_3752"

  - pvalue_threshold:
      type: number
      description: |
        P-value threshold for significance in temporal expression patterns
      pattern: "[0-9]+(\\.[0-9]+)?"

  - rsq_threshold:
      type: number
      description: |
        R-squared threshold for model fit quality
      pattern: "[0-9]+(\\.[0-9]+)?"

  - cluster_method:
      type: string
      description: |
        Clustering method for grouping temporal expression patterns
        Options: hclust, kmeans, Mclust
      pattern: "hclust|kmeans|Mclust"

output:
  masigpro_results:
    - masigpro_results:
        type: file
        description: |
          Directory containing all maSigPro analysis results
        pattern: "masigpro_results/*"

  unfiltered_log2cpm:
    - masigpro_results/unfiltered_log2cpm.rds:
        type: file
        description: |
          RDS file with unfiltered log2-CPM normalized counts
        pattern: "masigpro_results/unfiltered_log2cpm.rds"
        ontologies: []

  filtered_log2cpm:
    - masigpro_results/filtered_log2cpm.rds:
        type: file
        description: |
          RDS file with filtered log2-CPM normalized counts
        pattern: "masigpro_results/filtered_log2cpm.rds"
        ontologies: []

  normalized_log2cpm:
    - masigpro_results/normalized_log2cpm.rds:
        type: file
        description: |
          RDS file with TMM normalized log2-CPM counts
        pattern: "masigpro_results/normalized_log2cpm.rds"
        ontologies: []

  cluster_plots:
    - masigpro_results/*clusterplots.pdf:
        type: file
        description: |
          PDF files with cluster visualization plots
        pattern: "masigpro_results/*clusterplots.pdf"
        ontologies:
          - edam: "http://edamontology.org/format_3508"

  cluster_median_expression:
    - masigpro_results/*median_expression.csv:
        type: file
        description: |
          CSV file with median expression values per cluster
        pattern: "masigpro_results/*median_expression.csv"
        ontologies:
          - edam: "http://edamontology.org/format_3752"

  summary_statistics:
    - masigpro_results/*statistics.csv:
        type: file
        description: |
          CSV file with summary statistics of the analysis
        pattern: "masigpro_results/*statistics.csv"
        ontologies:
          - edam: "http://edamontology.org/format_3752"

  cluster_assignments:
    - masigpro_results/*assignments.csv:
        type: file
        description: |
          CSV file with cluster assignments for significant genes
        pattern: "masigpro_results/*assignments.csv"
        ontologies:
          - edam: "http://edamontology.org/format_3752"

  significant_expression:
    - masigpro_results/expression_matrix_siggenes.rds:
        type: file
        description: |
          RDS file with expression matrix of significant genes
        pattern: "masigpro_results/expression_matrix_siggenes.rds"
        ontologies: []

  clusters_list:
    - masigpro_results/clusters_list.rds:
        type: file
        description: |
          RDS file with cluster membership list
        pattern: "masigpro_results/clusters_list.rds"
        ontologies: []

  versions_masigpro:
    - - "${task.process}":
          type: string
          description: The name of the process
      - r_base:
          type: string
          description: The name of R programming language
      - "echo $(R --version 2>&1) | sed 's/^.*R version //; s/ .*$//'":
          type: eval
          description: The expression to obtain the version of R
      - bioconductor_masigpro:
          type: string
          description: The name of the maSigPro package
      - 'Rscript -e "library(maSigPro); cat(as.character(packageVersion(''maSigPro'')))"':
          type: eval
          description: The expression to obtain the version of maSigPro
      - r_dplyr:
          type: string
          description: The name of the dplyr package
      - 'Rscript -e "library(dplyr); cat(as.character(packageVersion(''dplyr'')))"':
          type: eval
          description: The expression to obtain the version of dplyr
      - r_tibble:
          type: string
          description: The name of the tibble package
      - 'Rscript -e "library(tibble); cat(as.character(packageVersion(''tibble'')))"':
          type: eval
          description: The expression to obtain the version of tibble
      - bioconductor_edger:
          type: string
          description: The name of the edgeR package
      - 'Rscript -e "library(edgeR); cat(as.character(packageVersion(''edgeR'')))"':
          type: eval
          description: The expression to obtain the version of edgeR
      - r_ggplot2:
          type: string
          description: The name of the ggplot2 package
      - 'Rscript -e "library(ggplot2); cat(as.character(packageVersion(''ggplot2'')))"':
          type: eval
          description: The expression to obtain the version of ggplot2
      - r_reshape2:
          type: string
          description: The name of the reshape2 package
      - 'Rscript -e "library(reshape2); cat(as.character(packageVersion(''reshape2'')))"':
          type: eval
          description: The expression to obtain the version of reshape2
      - r_patchwork:
          type: string
          description: The name of the patchwork package
      - 'Rscript -e "library(patchwork); cat(as.character(packageVersion(''patchwork'')))"':
          type: eval
          description: The expression to obtain the version of patchwork
      - r_mclust:
          type: string
          description: The name of the mclust package
      - 'Rscript -e "library(mclust); cat(as.character(packageVersion(''mclust'')))"':
          type: eval
          description: The expression to obtain the version of mclust

