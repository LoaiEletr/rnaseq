name: dexseq_prepareannotation
description: |
  Prepares GTF annotation files for DEXSeq differential exon usage analysis.
keywords:
  - dexseq
  - annotation
  - gtf
  - gff
tools:
  - htseq:
      description: "Analysing high-throughput sequencing data with Python"
      homepage: "https://htseq.readthedocs.io/"
      documentation: "https://htseq.readthedocs.io/en/master/"
      tool_dev_url: "https://github.com/htseq/htseq"
      licence: ["GPL-3.0-only"]
      identifier: "htseq"

input:
  - gtf:
      type: file
      description: |
        GTF annotation file to convert to DEXSeq GFF format
      pattern: "*.{gtf,gtf.gz}"
      ontologies:
        - edam: "http://edamontology.org/format_2305"

  - aggregation:
      type: boolean
      description: |
        Whether to aggregate transcripts to genes (true) or keep all transcripts (false)
      pattern: "true|false"

output:
  gff:
    - "*.gff":
        type: file
        description: |
          GFF file formatted for DEXSeq analysis
        pattern: "*.gff"
        ontologies:
          - edam: "http://edamontology.org/format_2305"

  versions_htseq:
    - - "${task.process}":
          type: string
          description: The name of the process
      - htseq:
          type: string
          description: The name of the HTSeq package
      - 'python -c "import pkg_resources; print(pkg_resources.get_distribution(''htseq'').version)"':
          type: eval
          description: The expression to obtain the version of HTSeq

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - htseq:
          type: string
          description: The name of the HTSeq package
      - 'python -c "import pkg_resources; print(pkg_resources.get_distribution(''htseq'').version)"':
          type: eval
          description: The expression to obtain the version of HTSeq

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
