name: dexseq_deu
description: |
  Performs Differential Exon Usage (DEU) analysis using DEXSeq.
keywords:
  - dexseq
  - differential exon usage
  - splicing
  - rna-seq
tools:
  - bioconductor_dexseq:
      description: "Inference of differential exon usage in RNA-seq data"
      homepage: "https://bioconductor.org/packages/DEXSeq/"
      documentation: "https://bioconductor.org/packages/release/bioc/html/DEXSeq.html"
      tool_dev_url: "https://github.com/Bioconductor/DEXSeq"
      licence: ["GPL-3.0-only"]
      identifier: "DEXSeq"

input:
  - counts_txt:
      type: file
      description: |
        Directory containing exon count files from dexseq_count.py
      pattern: "*"

  - samplesheet_csv:
      type: file
      description: |
        CSV file with sample metadata and experimental design
      pattern: "*.csv"
      ontologies:
        - edam: "http://edamontology.org/format_3752"

  - flattened_gff:
      type: file
      description: |
        GFF annotation file prepared by dexseq_prepare_annotation.py
      pattern: "*.gff"
      ontologies:
        - edam: "http://edamontology.org/format_2305"

  - pvalue_threshold:
      type: number
      description: |
        Adjusted p-value threshold for significance
      pattern: "[0-9]+(\\.[0-9]+)?"

  - logfc_threshold:
      type: number
      description: |
        Log2 fold change threshold for significance
      pattern: "[0-9]+(\\.[0-9]+)?"

  - top_n:
      type: integer
      description: |
        Number of top differentially used exons to visualize
      pattern: "[0-9]+"

  - min_exonlength:
      type: integer
      description: |
        Minimum exon length filter
      pattern: "[0-9]+"

output:
  results_table:
    - DEXSeq_table.csv:
        type: file
        description: |
          CSV file with full DEXSeq results table
        pattern: "DEXSeq_table.csv"
        ontologies:
          - edam: "http://edamontology.org/format_3752"
        optional: true

  significant_results:
    - significant_DEUs.csv:
        type: file
        description: |
          CSV file with significant differentially used exons
        pattern: "significant_DEUs.csv"
        ontologies:
          - edam: "http://edamontology.org/format_3752"
        optional: true

  ma_plot:
    - DEXSeq_MA_plot.pdf:
        type: file
        description: |
          PDF file with MA plot of exon usage
        pattern: "DEXSeq_MA_plot.pdf"
        ontologies:
          - edam: "http://edamontology.org/format_3508"
        optional: true

  gene_plots:
    - top_DEU_plots:
        type: file
        description: |
          Directory containing plots of top differentially used exons
        pattern: "top_DEU_plots/*"
        optional: true

  significant_genes:
    - significant_DEU_gene_ids.rds:
        type: file
        description: |
          RDS file with gene IDs of significant differentially used exons
        pattern: "significant_DEU_gene_ids.rds"
        ontologies: []
        optional: true

  report:
    - DEXSeqReport:
        type: file
        description: |
          Directory containing DEXSeq HTML report
        pattern: "DEXSeqReport/*"
        optional: true

  versions_dexseq:
    - - "${task.process}":
          type: string
          description: The name of the process
      - r_base:
          type: string
          description: The name of R programming language
      - "echo $(R --version 2>&1) | sed 's/^.*R version //; s/ .*$//'":
          type: eval
          description: The expression to obtain the version of R
      - bioconductor_dexseq:
          type: string
          description: The name of the DEXSeq package
      - 'Rscript -e "library(DEXSeq); cat(as.character(packageVersion(''DEXSeq'')))"':
          type: eval
          description: The expression to obtain the version of DEXSeq

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - r_base:
          type: string
          description: The name of R programming language
      - "echo $(R --version 2>&1) | sed 's/^.*R version //; s/ .*$//'":
          type: eval
          description: The expression to obtain the version of R
      - bioconductor_dexseq:
          type: string
          description: The name of the DEXSeq package
      - 'Rscript -e "library(DEXSeq); cat(as.character(packageVersion(''DEXSeq'')))"':
          type: eval
          description: The expression to obtain the version of DEXSeq

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
