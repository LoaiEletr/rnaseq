name: "dexseq_deu"
description: |
  Performs Differential Exon Usage (DEU) analysis using DEXSeq.
  Identifies significant changes in the relative usage of exonic bins
  across different experimental conditions.
keywords:
  - dexseq
  - differential exon usage
  - splicing
  - rna-seq
tools:
  - bioconductor_dexseq:
      description: "Inference of differential exon usage in RNA-seq data"
      homepage: "https://bioconductor.org/packages/DEXSeq/"
      documentation: "https://bioconductor.org/packages/release/bioc/html/DEXSeq.html"
      tool_dev_url: "https://github.com/Bioconductor/DEXSeq"
      doi: "10.1101/gr.133744.111"
      licence: ["GPL-3.0-only"]
      identifier: "DEXSeq"

input:
  - - counts_txt:
        type: file
        description: List of exon count files generated by dexseq_count.py.
        pattern: "*"
        ontologies: []
  - - samplesheet_csv:
        type: file
        description: CSV file containing sample metadata and experimental design factors.
        pattern: "*.csv"
        ontologies:
          - edam: "http://edamontology.org/format_3752" # CSV
  - - meta:
        type: map
        description: |
          Groovy Map containing information about the annotation
          e.g. [ id:'genome_v1' ]
    - flattened_gff:
        type: file
        description: Flattened GFF annotation file prepared by dexseq_prepare_annotation.py.
        pattern: "*.gff"
        ontologies:
          - edam: "http://edamontology.org/format_2305" # GFF
  - - pvalue_threshold:
        type: float
        description: Adjusted p-value threshold for defining significant DEU.
        ontologies: []
  - - logfc_threshold:
        type: float
        description: Log2 fold change threshold for significant exon usage changes.
        ontologies: []
  - - top_n:
        type: integer
        description: Number of top significant genes to generate visualization plots for.
        ontologies: []
  - - min_exonlength:
        type: integer
        description: Minimum exon length in base pairs to consider for the analysis.
        ontologies: []

output:
  results_table:
    - DEXSeq_table.csv:
        type: file
        description: Comprehensive table containing results for all exonic bins.
        pattern: "DEXSeq_table.csv"
        ontologies:
          - edam: "http://edamontology.org/format_3752" # CSV
  significant_results:
    - significant_DEUs.csv:
        type: file
        description: Table containing results filtered for significant DEU.
        pattern: "significant_DEUs.csv"
        ontologies:
          - edam: "http://edamontology.org/format_3752" # CSV
  ma_plot:
    - DEXSeq_MA_plot.pdf:
        type: file
        description: MA plot showing the relationship between mean expression and exon usage change.
        pattern: "*.pdf"
        ontologies:
          - edam: "http://edamontology.org/format_3508" # PDF
  gene_plots:
    - top_DEU_plots:
        type: directory
        description: Directory containing plots of the most significant DEU genes.
        pattern: "top_DEU_plots/"
        ontologies: []
  significant_genes:
    - significant_DEU_gene_ids.rds:
        type: file
        description: RDS file containing the IDs of genes with significant DEU.
        pattern: "*.rds"
        ontologies: []
  report:
    - DEXSeqReport:
        type: directory
        description: HTML report generated by DEXSeq for interactive exploration of results.
        pattern: "DEXSeqReport/"
        ontologies: []
  versions_rbase:
    - - "${task.process}":
          type: string
          description: The name of the process
      - r-base:
          type: string
      - "Rscript -e 'cat(as.character(getRversion()))'":
          type: eval
  versions_dexseq:
    - - "${task.process}":
          type: string
      - bioconductor-dexseq:
          type: string
      - 'Rscript -e "cat(as.character(packageVersion(''DEXSeq'')))"':
          type: eval

topics:
  versions:
    - - "${task.process}":
          type: string
      - r-base:
          type: string
      - "Rscript -e 'cat(as.character(getRversion()))'":
          type: eval
    - - "${task.process}":
          type: string
      - bioconductor-dexseq:
          type: string
      - 'Rscript -e "cat(as.character(packageVersion(''DEXSeq'')))"':
          type: eval

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
