name: cutadapt
description: |
  Removes adapter sequences from high-throughput sequencing reads.
keywords:
  - adapter trimming
  - quality control
  - preprocessing
tools:
  - cutadapt:
      description: "Tool to find and remove adapter sequences, primers, poly-A tails and other types of unwanted sequence from high-throughput sequencing reads"
      homepage: "https://cutadapt.readthedocs.io/"
      documentation: "https://cutadapt.readthedocs.io/"
      tool_dev_url: "https://github.com/marcelm/cutadapt"
      licence: ["MIT"]
      identifier: "cutadapt"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - reads:
        type: file
        description: |
          Input FASTQ file(s) to be trimmed.
          Single file for single-end, two files for paired-end data.
        pattern: "*.{fastq,fq,fastq.gz,fq.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_1930" # FASTQ
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - adapter:
        type: file
        description: File containing adapter sequences to be removed
        pattern: "*.{fa,fasta,txt}"
        ontologies:
          - edam: "http://edamontology.org/format_1929" # FASTA

output:
  reads:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*.fastq.gz":
          type: file
          description: |
            Trimmed FASTQ file(s).
            Single file for single-end, two files for paired-end data.
          pattern: "*.fastq.gz"
          ontologies:
            - edam: "http://edamontology.org/format_1930" # FASTQ
  json:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*.json":
          type: file
          description: JSON file containing trimming statistics
          pattern: "*.json"
          ontologies:
            - edam: "http://edamontology.org/format_3464" # JSON
  versions_cutadapt:
    - - "${task.process}":
          type: string
          description: The name of the process
      - cutadapt:
          type: string
          description: The name of the tool
      - "cutadapt --version":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - cutadapt:
          type: string
          description: The name of the tool
      - "cutadapt --version":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@LoaiEletr"
maintainers:
  - "@LoaiEletr"
