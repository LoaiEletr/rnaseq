name: merge_counts
description: |
  Aggregates and merges multiple individual featureCounts output files into a single structured count matrix.
  The output is saved as an RDS file for easy loading into R-based differential expression tools like DESeq2 or EdgeR.
keywords:
  - count matrix
  - merging
  - featurecounts
  - rna-seq
  - quantification
tools:
  - r_base:
      description: "R programming language for statistical computing"
      homepage: "https://www.r-project.org/"
      documentation: "https://www.r-project.org/"
      tool_dev_url: "https://cran.r-project.org/"
      licence: ["GPL-2.0-only"]
      identifier: "r_base"

input:
  - - counts:
        type: file
        description: |
          List of count files generated by featureCounts.
          Expects the standard tabular output from featureCounts.
        pattern: "*.counts.txt"
        ontologies: []

output:
  counts_table:
    - "merged_counts.rds":
        type: file
        description: R serialized data (RDS) file containing the merged matrix.
        pattern: "*.rds"
        ontologies: []
  versions_rbase:
    - - "${task.process}":
          type: string
          description: The name of the process
      - rbase:
          type: string
          description: The name of the tool
      - "Rscript -e 'cat(as.character(getRversion()))'":
          type: eval
          description: The expression to obtain the version of R

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - rbase:
          type: string
          description: The name of the tool
      - "Rscript -e 'cat(as.character(getRversion()))'":
          type: eval
          description: The expression to obtain the version of R

authors:
  - "@LoaiEletr"
maintainers:
  - "@LoaiEletr"
