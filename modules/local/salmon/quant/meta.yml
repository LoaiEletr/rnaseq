name: salmon_quant
description: |
  Quantifies transcript abundances from RNA-seq reads using Salmon with strand-specific options.
  Supports automatic library type detection or manual specification.
keywords:
  - salmon
  - quantification
  - rna-seq
  - transcript
  - expression
tools:
  - salmon:
      description: "Fast, bias-aware quantification of transcript expression"
      homepage: "https://combine-lab.github.io/salmon/"
      documentation: "https://salmon.readthedocs.io/"
      tool_dev_url: "https://github.com/COMBINE-lab/salmon"
      doi: "10.1038/nmeth.4197"
      licence: ["GPL-3.0-only"]
      identifier: "salmon"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false, lib_type:'ISF' ]`
    - reads:
        type: file
        description: |
          Input FASTQ file(s) for quantification.
          Single file for single-end, two files for paired-end data.
        pattern: "*.{fastq,fq,fastq.gz,fq.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_1930" # FASTQ
  - - meta2:
        type: map
        description: |
          Groovy Map containing index information
          e.g. `[ id:'test_index' ]`
    - index:
        type: file
        description: Salmon transcriptome index directory
        pattern: "*/"
  - - meta3:
        type: map
        description: |
          Groovy Map containing annotation information
          e.g. `[ id:'test_annotation' ]`
    - gtf:
        type: file
        description: GTF annotation file for transcript-to-gene mapping
        pattern: "*.{gtf,gtf.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_2306" # GTF

output:
  quant_dir:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false, lib_type:'ISF' ]`
      - "${prefix}":
          type: directory
          description: Directory containing Salmon quantification results
          pattern: "*/"
          ontologies: []
  strandness:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false, lib_type:'ISF' ]`
      - SALMON_STRANDNESS:
          type: string
          description: Detected library strandness string from Salmon logs
          ontologies: []
  versions_salmon:
    - - "${task.process}":
          type: string
          description: The name of the process
      - salmon:
          type: string
          description: The name of the tool
      - "salmon --version | sed 's/salmon //'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - salmon:
          type: string
          description: The name of the tool
      - "salmon --version | sed 's/salmon //'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
