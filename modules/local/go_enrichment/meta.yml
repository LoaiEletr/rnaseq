name: "go_enrichment"
description: |
  Performs comprehensive Gene Ontology (GO) enrichment analysis using clusterProfiler.
  The module supports multiple analysis types including Differential Expression (DE),
  WGCNA modules, MaSigPro clusters, Differential Isoform Usage (DIU), and
  Differential Exon Usage (DEU). It supports a wide range of species through
  organism-specific annotation (OrgDb) databases.
keywords:
  - go enrichment
  - functional analysis
  - ontology
  - genomics
  - clusterprofiler
  - r
tools:
  - bioconductor_clusterprofiler:
      description: "Statistical analysis and visualization of functional profiles for genes and gene clusters"
      homepage: "https://bioconductor.org/packages/clusterProfiler/"
      documentation: "https://bioconductor.org/packages/release/bioc/html/clusterProfiler.html"
      tool_dev_url: "https://github.com/YuLab-SMU/clusterProfiler"
      doi: "10.1016/j.xinn.2021.100141"
      licence: ["Artistic-2.0"]
      identifier: "clusterProfiler"

input:
  - - unfiltered_deg:
        type: file
        description: RDS file with unfiltered differential expression results.
        pattern: "*.rds"
        ontologies: []
  - - pvalue_threshold:
        type: float
        description: P-value threshold for enrichment significance (e.g., 0.05).
  - - logfc_threshold:
        type: float
        description: Log2 fold change threshold for gene filtering.
  - - species_name:
        type: string
        description: Species name used to select the correct OrgDb (e.g., "human", "mouse").
  - - wgcna_list:
        type: file
        description: Optional RDS file containing WGCNA module results.
        pattern: "*.rds"
        ontologies: []
  - - masigpro_list:
        type: file
        description: Optional RDS file containing MaSigPro temporal cluster results.
        pattern: "*.rds"
        ontologies: []
  - - genes_diu:
        type: file
        description: Optional RDS file containing genes from differential isoform usage analysis.
        pattern: "*.rds"
        ontologies: []
  - - genes_deu:
        type: file
        description: Optional RDS file containing genes from differential exon usage analysis.
        pattern: "*.rds"
        ontologies: []
  - - ntop_processes:
        type: integer
        description: Number of top GO processes to display in generated plots.

output:
  go_results:
    - GO_results:
        type: directory
        description: Directory containing GO enrichment tables and visualization plots.
        pattern: "GO_results/"
        ontologies: []
  versions_rbase:
    - - "${task.process}":
          type: string
          description: The name of the process
      - r-base:
          type: string
      - "Rscript -e 'cat(as.character(getRversion()))'":
          type: eval
  versions_clusterprofiler:
    - - "${task.process}":
          type: string
      - bioconductor-clusterprofiler:
          type: string
      - 'Rscript -e "cat(as.character(packageVersion(''clusterProfiler'')))"':
          type: eval
  versions_ggplot2:
    - - "${task.process}":
          type: string
      - r-ggplot2:
          type: string
      - 'Rscript -e "cat(as.character(packageVersion(''ggplot2'')))"':
          type: eval
  versions_org_hs_eg_db:
