name: gunzip
description: |
  Decompresses gzip-compressed files.
keywords:
  - decompression
  - gzip
  - file format
tools:
  - gzip:
      description: "GNU zip compression utility"
      homepage: "https://www.gnu.org/software/gzip/"
      documentation: "https://www.gnu.org/software/gzip/manual/gzip.html"
      tool_dev_url: "https://git.savannah.gnu.org/cgit/gzip.git"
      licence: ["GPL-3.0-only"]
      identifier: "gzip"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing file information
          e.g. `[ id:'file1' ]`
    - archive:
        type: file
        description: |
          Gzip-compressed file to be decompressed
        pattern: "*.gz"
        ontologies:
          - edam: "http://edamontology.org/format_3989"

output:
  gunzip:
    - - meta:
          type: map
          description: |
            Groovy Map containing file information
            e.g. `[ id:'file1' ]`
      - "${gunzip}":
          type: file
          description: |
            Decompressed file (original name without .gz extension)
          pattern: "*"
          ontologies: []

  versions_gunzip:
    - - "${task.process}":
          type: string
          description: The name of the process
      - gunzip:
          type: string
          description: The name of the tool
      - "gunzip --version | grep 'gunzip' | awk '{print $3}'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - gunzip:
          type: string
          description: The name of the tool
      - "gunzip --version | grep 'gunzip' | awk '{print $3}'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
