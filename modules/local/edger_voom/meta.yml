name: edger_voom
description: |
  Performs count normalization and variance stabilization using edgeR and voom transformation.
keywords:
  - edger
  - voom
  - normalization
  - rna-seq
tools:
  - bioconductor_edger:
      description: "Empirical analysis of digital gene expression data in R"
      homepage: "https://bioconductor.org/packages/edgeR/"
      documentation: "https://bioconductor.org/packages/release/bioc/html/edgeR.html"
      tool_dev_url: "https://github.com/LTLA/edgeR"
      licence: ["GPL-2.0-only"]
      identifier: "edgeR"

input:
  - count_matrix_rds:
      type: file
      description: |
        RDS file containing count matrix
      pattern: "*.rds"
      ontologies: []

  - samplesheet_csv:
      type: file
      description: |
        CSV file containing sample metadata
      pattern: "*.csv"
      ontologies:
        - edam: "http://edamontology.org/format_3752"

output:
  unfiltered_log2cpm:
    - unfiltered_log2cpm.rds:
        type: file
        description: |
          RDS file with unfiltered log2-CPM normalized counts
        pattern: "unfiltered_log2cpm.rds"
        ontologies: []

  filtered_log2cpm:
    - filtered_log2cpm.rds:
        type: file
        description: |
          RDS file with filtered log2-CPM normalized counts
        pattern: "filtered_log2cpm.rds"
        ontologies: []

  normalized_log2cpm:
    - normalized_log2cpm.rds:
        type: file
        description: |
          RDS file with TMM normalized log2-CPM counts
        pattern: "normalized_log2cpm.rds"
        ontologies: []

  voom_transformed:
    - voom_transformed.rds:
        type: file
        description: |
          RDS file with voom-transformed counts
        pattern: "voom_transformed.rds"
        ontologies: []

  voom_plot:
    - voom_plot.pdf:
        type: file
        description: |
          PDF file with voom mean-variance trend plot
        pattern: "voom_plot.pdf"
        ontologies:
          - edam: "http://edamontology.org/format_3508"

  versions_edger:
    - - "${task.process}":
          type: string
          description: The name of the process
      - r_base:
          type: string
          description: The name of R programming language
      - "echo $(R --version 2>&1) | sed 's/^.*R version //; s/ .*$//'":
          type: eval
          description: The expression to obtain the version of R
      - bioconductor_edger:
          type: string
          description: The name of the edgeR package
      - 'Rscript -e "library(edgeR); cat(as.character(packageVersion(''edgeR'')))"':
          type: eval
          description: The expression to obtain the version of edgeR

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - r_base:
          type: string
          description: The name of R programming language
      - "echo $(R --version 2>&1) | sed 's/^.*R version //; s/ .*$//'":
          type: eval
          description: The expression to obtain the version of R
      - bioconductor_edger:
          type: string
          description: The name of the edgeR package
      - 'Rscript -e "library(edgeR); cat(as.character(packageVersion(''edgeR'')))"':
          type: eval
          description: The expression to obtain the version of edgeR

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
