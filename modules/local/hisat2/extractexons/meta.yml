name: hisat2_extractexons
description: |
  Extracts exon information from GTF files for HISAT2 indexing.
keywords:
  - hisat2
  - exons
  - gtf
tools:
  - hisat2:
      description: "Hierarchical indexing for spliced alignment of transcripts"
      homepage: "https://daehwankimlab.github.io/hisat2/"
      documentation: "https://daehwankimlab.github.io/hisat2/manual/"
      tool_dev_url: "https://github.com/DaehwanKimLab/hisat2"
      licence: ["GPL-3.0-only"]
      identifier: "hisat2"

input:
  - gtf:
      type: file
      description: |
        Input GTF annotation file
      pattern: "*.{gtf,gtf.gz}"
      ontologies:
        - edam: "http://edamontology.org/format_2306"

output:
  exons_sites:
    - "*.exons.tsv":
        type: file
        description: |
          TSV file containing exon coordinates extracted from GTF
        pattern: "*.exons.tsv"
        ontologies:
          - edam: "http://edamontology.org/format_3475"

  versions_hisat2:
    - - "${task.process}":
          type: string
          description: The name of the process
      - hisat2:
          type: string
          description: The name of the tool
      - "hisat2 --version | head -n 1 | awk '{print $3}'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - hisat2:
          type: string
          description: The name of the tool
      - "hisat2 --version | head -n 1 | awk '{print $3}'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
