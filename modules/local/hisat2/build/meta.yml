name: hisat2_build
description: |
  Builds HISAT2 genome index with splice and exon site annotations.
keywords:
  - hisat2
  - index
  - genome
tools:
  - hisat2:
      description: "Hierarchical indexing for spliced alignment of transcripts"
      homepage: "https://daehwankimlab.github.io/hisat2/"
      documentation: "https://daehwankimlab.github.io/hisat2/manual/"
      tool_dev_url: "https://github.com/DaehwanKimLab/hisat2"
      licence: ["GPL-3.0-only"]
      identifier: "hisat2"

input:
  - ref:
      type: file
      description: |
        Reference genome in FASTA format
      pattern: "*.{fasta,fa,fasta.gz,fa.gz}"
      ontologies:
        - edam: "http://edamontology.org/format_1929"

  - splice_sites:
      type: file
      description: |
        Splice sites file generated by hisat2_extract_splice_sites.py
      pattern: "*.splice_sites.tsv"
      ontologies:
        - edam: "http://edamontology.org/format_3475"

  - exons_sites:
      type: file
      description: |
        Exon sites file generated by hisat2_extract_exons.py
      pattern: "*.exons.tsv"
      ontologies:
        - edam: "http://edamontology.org/format_3475"

output:
  index:
    - index:
        type: file
        description: |
          Directory containing HISAT2 genome index files
        pattern: "index/*"
        ontologies: []

  versions_hisat2:
    - - "${task.process}":
          type: string
          description: The name of the process
      - hisat2:
          type: string
          description: The name of the tool
      - "hisat2 --version | head -n 1 | awk '{print $3}'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - hisat2:
          type: string
          description: The name of the tool
      - "hisat2 --version | head -n 1 | awk '{print $3}'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
