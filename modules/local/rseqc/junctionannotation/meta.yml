name: "rseqc_junctionannotation"
description: |
  Annotates splice junctions from RNA-seq BAM files using RSeQC junction_annotation.py.
  Identifies and classifies splicing events and generates visualization plots.
keywords:
  - rseqc
  - splice junctions
  - annotation
  - rna-seq
tools:
  - "rseqc":
      description: "RNA-seq quality control package"
      homepage: "http://rseqc.sourceforge.net/"
      documentation: "http://rseqc.sourceforge.net/"
      tool_dev_url: "https://sourceforge.net/projects/rseqc/"
      licence: ["GPL-3.0-only"]
      identifier: "rseqc"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - bam:
        type: file
        description: |
          BAM file for splice junction annotation
        pattern: "*.{bam,bam.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_2572"

  - bed:
      type: file
      description: |
        BED file with gene annotations for junction mapping
      pattern: "*.{bed,bed.gz}"
      ontologies:
        - edam: "http://edamontology.org/format_3003"

output:
  xls:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.xls":
          type: file
          description: |
            Excel file with junction annotation results including splice junction statistics
          pattern: "*.xls"
          ontologies:
            - edam: "http://edamontology.org/format_3468"

  rscript:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.r":
          type: file
          description: |
            R script for generating junction plots and visualizations
          pattern: "*.r"
          ontologies:
            - edam: "http://edamontology.org/format_3999"

  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.log":
          type: file
          description: |
            Log file from junction annotation analysis
          pattern: "*.log"
          ontologies:
            - edam: "http://edamontology.org/data_1678"

  junction_bed:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.junction.bed":
          type: file
          description: |
            BED file with annotated splice junctions
          pattern: "*.junction.bed"
          ontologies:
            - edam: "http://edamontology.org/format_3003"
        optional: true

  interact_bed:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.Interact.bed":
          type: file
          description: |
            BED file with interaction annotations for visualization
          pattern: "*.Interact.bed"
          ontologies:
            - edam: "http://edamontology.org/format_3003"
        optional: true

  junction_pdf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*junction.pdf":
          type: file
          description: |
            PDF plot showing annotated splice junctions
          pattern: "*junction.pdf"
          ontologies:
            - edam: "http://edamontology.org/format_3508"
        optional: true

  events_pdf:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*events.pdf":
          type: file
          description: |
            PDF plot showing splicing events classification
          pattern: "*events.pdf"
          ontologies:
            - edam: "http://edamontology.org/format_3508"
        optional: true

  versions_rseqc:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "rseqc":
          type: string
          description: The name of the tool
      - "junction_annotation.py --version | sed 's/.*.py //'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "rseqc":
          type: string
          description: The name of the tool
      - "junction_annotation.py --version | sed 's/.*.py //'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
