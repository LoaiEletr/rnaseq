name: rseqc_readdistribution
description: |
  Calculates read distribution across genomic features using RSeQC read_distribution.py.
keywords:
  - rseqc
  - read distribution
  - genomic features
  - rna-seq
tools:
  - rseqc:
      description: "RNA-seq quality control package"
      homepage: "http://rseqc.sourceforge.net/"
      documentation: "http://rseqc.sourceforge.net/"
      tool_dev_url: "https://sourceforge.net/projects/rseqc/"
      licence: ["GPL-3.0-only"]
      identifier: "rseqc"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - bam:
        type: file
        description: |
          BAM file for read distribution analysis
        pattern: "*.{bam,bam.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_2572"

  - bed:
      type: file
      description: |
        BED file with genomic feature annotations
      pattern: "*.{bed,bed.gz}"
      ontologies:
        - edam: "http://edamontology.org/format_3003"

output:
  txt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.read_distribution.txt":
          type: file
          description: |
            Text file with read distribution statistics
          pattern: "*.read_distribution.txt"
          ontologies:
            - edam: "http://edamontology.org/format_2330"

  versions_rseqc:
    - - "${task.process}":
          type: string
          description: The name of the process
      - rseqc:
          type: string
          description: The name of the tool
      - "read_distribution.py --version | sed 's/.*.py //'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - rseqc:
          type: string
          description: The name of the tool
      - "read_distribution.py --version | sed 's/.*.py //'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
