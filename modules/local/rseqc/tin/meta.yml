name: rseqc_tin
description: |
  Calculates Transcript Integrity Number (TIN) from RNA-seq BAM files using RSeQC tin.py.
keywords:
  - rseqc
  - tin
  - transcript integrity
  - rna-seq
tools:
  - rseqc:
      description: "RNA-seq quality control package"
      homepage: "http://rseqc.sourceforge.net/"
      documentation: "http://rseqc.sourceforge.net/"
      tool_dev_url: "https://sourceforge.net/projects/rseqc/"
      licence: ["GPL-3.0-only"]
      identifier: "rseqc"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - bam:
        type: file
        description: |
          BAM file for TIN calculation
        pattern: "*.{bam,bam.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_2572"
    - bai:
        type: file
        description: |
          BAM index file
        pattern: "*.{bai}"
        ontologies:
          - edam: "http://edamontology.org/format_3327"

  - bed:
      type: file
      description: |
        BED file with transcript annotations
      pattern: "*.{bed,bed.gz}"
      ontologies:
        - edam: "http://edamontology.org/format_3003"

output:
  txt:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.txt":
          type: file
          description: |
            Text file with TIN summary statistics
          pattern: "*.txt"
          ontologies:
            - edam: "http://edamontology.org/format_2330"

  xls:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.xls":
          type: file
          description: |
            Excel file with detailed TIN results
          pattern: "*.xls"
          ontologies:
            - edam: "http://edamontology.org/format_3468"

  versions_rseqc:
    - - "${task.process}":
          type: string
          description: The name of the process
      - rseqc:
          type: string
          description: The name of the tool
      - "tin.py --version | sed 's/.*.py //'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - rseqc:
          type: string
          description: The name of the tool
      - "tin.py --version | sed 's/.*.py //'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
