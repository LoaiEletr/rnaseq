name: kallisto_quant
description: |
  Quantifies transcript abundances from RNA-seq reads using kallisto with strand-specific options.
keywords:
  - kallisto
  - quantification
  - rna-seq
  - transcript
tools:
  - kallisto:
      description: "Near-optimal RNA-Seq quantification"
      homepage: "https://pachterlab.github.io/kallisto/"
      documentation: "https://pachterlab.github.io/kallisto/manual"
      tool_dev_url: "https://github.com/pachterlab/kallisto"
      licence: ["BSD-2-Clause"]
      identifier: "kallisto"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false, lib_type:'RF' ]`
    - reads:
        type: file
        description: |
          Input FASTQ file(s) for quantification
          Single file for single-end, two files for paired-end data
        pattern: "*.{fastq,fq,fastq.gz,fq.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_1930"

  - index:
      type: file
      description: |
        Kallisto index file for pseudoalignment
      pattern: "*.idx"
      ontologies: []

  - gtf:
      type: file
      description: |
        GTF annotation file for transcript-to-gene mapping
      pattern: "*.{gtf,gtf.gz}"
      ontologies:
        - edam: "http://edamontology.org/format_2306"

  - bootstrap_count:
      type: integer
      description: |
        Number of bootstrap samples for uncertainty estimation
      pattern: "[0-9]+"

  - fragment_length:
      type: integer
      description: |
        Estimated average fragment length (for single-end data)
      pattern: "[0-9]+"

  - fragment_length_sd:
      type: integer
      description: |
        Estimated standard deviation of fragment length (for single-end data)
      pattern: "[0-9]+"

output:
  quant_dir:
    - "${prefix}":
        type: file
        description: |
          Directory containing kallisto quantification results
        pattern: "*"

  quant_table:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false, lib_type:'RF' ]`
      - "${prefix}/abundance.tsv":
          type: file
          description: |
            TSV file with transcript abundance estimates
          pattern: "*/abundance.tsv"
          ontologies:
            - edam: "http://edamontology.org/format_3475"

  json_info:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false, lib_type:'RF' ]`
      - "${prefix}/run_info.json":
          type: file
          description: |
            JSON file with run information and statistics
          pattern: "*/run_info.json"
          ontologies:
            - edam: "http://edamontology.org/format_3464"

  log:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false, lib_type:'RF' ]`
      - "*.log":
        type: file
        description: |
          Log file from kallisto quantification
        pattern: "*.log"
        ontologies: []

  versions_kallisto:
    - - "${task.process}":
          type: string
          description: The name of the process
      - kallisto:
          type: string
          description: The name of the tool
      - "kallisto version | sed 's/.*ion //'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - kallisto:
          type: string
          description: The name of the tool
      - "kallisto version | sed 's/.*ion //'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
