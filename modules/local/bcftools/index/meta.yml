name: "bcftools_index"
description: Indexes VCF or BCF files for random access.
keywords:
  - bcftools
  - index
  - vcf
  - bcf
tools:
  - "bcftools":
      description: "BCFtools is a set of utilities that manipulate variant calls in the Variant Call Format (VCF) and its binary counterpart BCF."
      homepage: "http://samtools.github.io/bcftools/bcftools.html"
      documentation: "http://samtools.github.io/bcftools/bcftools.html#index"
      tool_dev_url: "https://github.com/samtools/bcftools"
      doi: "10.1093/bioinformatics/btp352"
      licence: ["MIT", "BSD-3-Clause"]
      identifier: biotools:bcftools

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - vcf:
        type: file
        description: VCF or BCF file to be indexed
        pattern: "*.{vcf,vcf.gz,bcf}"

output:
  csi:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.vcf.gz.csi":
          type: file
          description: Index file for the VCF/BCF
          pattern: "*.csi"
  versions_bcftools:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "bcftools":
          type: string
          description: The name of the tool
      - "bcftools --version | sed '1!d; s/^.*bcftools //'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "bcftools":
          type: string
          description: The name of the tool
      - "bcftools --version | sed '1!d; s/^.*bcftools //'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@LoaiEletr"
maintainers:
  - "@LoaiEletr"
