name: samtools_sort
description: |
  Sorts BAM files by genomic coordinates (or by name if specified via args) using samtools sort.
  Sorting is a prerequisite for indexing and most downstream analysis tools.
keywords:
  - samtools
  - sort
  - bam
  - coordination sort
tools:
  - samtools:
      description: "Tools for manipulating next-generation sequencing data"
      homepage: "https://www.htslib.org/"
      documentation: "https://www.htslib.org/doc/samtools.html"
      tool_dev_url: "https://github.com/samtools/samtools"
      doi: "10.1093/bioinformatics/btp352"
      licence: ["MIT"]
      identifier: "samtools"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - bam:
        type: file
        description: BAM file to sort
        pattern: "*.{bam}"
        ontologies:
          - edam: "http://edamontology.org/format_2572" # BAM

output:
  sorted_bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.sorted.bam":
          type: file
          description: Coordinate-sorted BAM file
          pattern: "*.sorted.bam"
          ontologies:
            - edam: "http://edamontology.org/format_2572" # BAM
  versions_samtools:
    - - "${task.process}":
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - "samtools --version | head -n 1 | sed 's/samtools //'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - "samtools --version | head -n 1 | sed 's/samtools //'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@LoaiEletr"
maintainers:
  - "@LoaiEletr"
