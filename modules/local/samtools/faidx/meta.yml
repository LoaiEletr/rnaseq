name: "samtools_faidx"
description: Index a reference sequence in FASTA format.
keywords:
  - samtools
  - faidx
  - fasta
  - indexing
tools:
  - "samtools":
      description: "SAMtools is a suite of programs for interacting with (reading, writing, editing, indexing, extracting) high-throughput sequencing data in SAM, BAM and CRAM formats."
      homepage: "http://www.htslib.org/"
      documentation: "http://www.htslib.org/doc/samtools-faidx.html"
      tool_dev_url: "https://github.com/samtools/samtools"
      doi: "10.1093/bioinformatics/btp352"
      licence: ["MIT", "BSD-3-Clause"]
      identifier: biotools:samtools

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - fasta:
        type: file
        description: FASTA file to be indexed
        pattern: "*.{fasta,fa}"
        ontologies:
          - edam: "http://edamontology.org/format_1929" # FASTA

output:
  fai:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.fai":
          type: file
          description: Index file for the FASTA reference
          pattern: "*.fai"
          ontologies: []
  versions_samtools:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "samtools":
          type: string
          description: The name of the tool
      - "samtools --version | head -n 1 | sed 's/samtools //'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "samtools":
          type: string
          description: The name of the tool
      - "samtools --version | head -n 1 | sed 's/samtools //'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
