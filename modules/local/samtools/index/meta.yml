name: samtools_index
description: |
  Creates index files for BAM files using samtools index.
keywords:
  - samtools
  - index
  - bam
tools:
  - samtools:
      description: "Tools for manipulating next-generation sequencing data"
      homepage: "https://www.htslib.org/"
      documentation: "https://www.htslib.org/doc/samtools.html"
      tool_dev_url: "https://github.com/samtools/samtools"
      licence: ["MIT"]
      identifier: "samtools"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - bam:
        type: file
        description: |
          BAM file to index
        pattern: "*.{bam,bam.gz}"
        ontologies:
          - edam: "http://edamontology.org/format_2572"

output:
  bai:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.bai":
          type: file
          description: |
            Index file for BAM input
          pattern: "*.bai"
          ontologies:
            - edam: "http://edamontology.org/format_3327"

  versions_samtools:
    - - "${task.process}":
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - "samtools --version | head -n 1 | sed 's/samtools //'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - samtools:
          type: string
          description: The name of the tool
      - "samtools --version | head -n 1 | sed 's/samtools //'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
