name: "samtools_merge"
description: Merge multiple BAM/CRAM/SAM files into one.
keywords:
  - samtools
  - merge
  - bam
tools:
  - "samtools":
      description: "SAMtools is a suite of programs for interacting with (reading, writing, editing, indexing, extracting) high-throughput sequencing data in SAM, BAM and CRAM formats."
      homepage: "http://www.htslib.org/"
      documentation: "http://www.htslib.org/doc/samtools-merge.html"
      tool_dev_url: "https://github.com/samtools/samtools"
      doi: "10.1093/bioinformatics/btp352"
      licence: ["MIT", "BSD-3-Clause"]
      identifier: biotools:samtools

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1' ]`
    - bams:
        type: list
        description: A list of BAM files to be merged
        pattern: "*.bam"
        ontologies:
          - edam: "http://edamontology.org/format_2572" # BAM

output:
  bam:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1' ]`
      - "*.bam":
          type: file
          description: Merged BAM file
          pattern: "*.bam"
          ontologies:
            - edam: "http://edamontology.org/format_2572" # BAM
  versions_samtools:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "samtools":
          type: string
          description: The name of the tool
      - "samtools --version | head -n 1 | sed 's/samtools //'":
          type: eval
          description: The expression to obtain the version of the tool

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "samtools":
          type: string
          description: The name of the tool
      - "samtools --version | head -n 1 | sed 's/samtools //'":
          type: eval
          description: The expression to obtain the version of the tool

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
