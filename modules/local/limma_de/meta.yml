name: limma_de
description: |
  Performs differential expression analysis using limma with empirical Bayes moderation.
keywords:
  - limma
  - differential expression
  - rna-seq
  - statistics
tools:
  - bioconductor_limma:
      description: "Linear models for microarray and RNA-seq data analysis"
      homepage: "https://bioconductor.org/packages/limma/"
      documentation: "https://bioconductor.org/packages/release/bioc/html/limma.html"
      tool_dev_url: "https://github.com/LTLA/limma"
      licence: ["GPL-2.0-only"]
      identifier: "limma"

input:
  - voom_object:
      type: file
      description: |
        RDS file containing voom-transformed expression data
      pattern: "*.rds"
      ontologies: []

  - samplesheet:
      type: file
      description: |
        CSV file with sample metadata and experimental design
      pattern: "*.csv"
      ontologies:
        - edam: "http://edamontology.org/format_3752"

  - pvalue_threshold:
      type: number
      description: |
        Adjusted p-value threshold for significance
      pattern: "[0-9]+(\\.[0-9]+)?"

  - logfc_threshold:
      type: number
      description: |
        Log2 fold change threshold for significance
      pattern: "[0-9]+(\\.[0-9]+)?"

  - top_genes:
      type: integer
      description: |
        Number of top differentially expressed genes to output
      pattern: "[0-9]+"

output:
  ebfit_rds:
    - ebfit.rds:
        type: file
        description: |
          RDS file with empirical Bayes fitted model
        pattern: "ebfit.rds"
        ontologies: []

  de_expression_rds:
    - de_expression_values.rds:
        type: file
        description: |
          RDS file with expression values of differentially expressed genes
        pattern: "de_expression_values.rds"
        ontologies: []

  de_genes_rds:
    - de_genes_full_table.rds:
        type: file
        description: |
          RDS file with full table of differentially expressed genes
        pattern: "de_genes_full_table.rds"
        ontologies: []

  unfiltered_deg_rds:
    - unfiltered_deg_results.rds:
        type: file
        description: |
          RDS file with unfiltered differential expression results
        pattern: "unfiltered_deg_results.rds"
        ontologies: []

  topgenes_rds:
    - "top_${top_genes}_genes.rds":
        type: file
        description: |
          RDS file with top differentially expressed genes
        pattern: "top_*_genes.rds"
        ontologies: []

  topgenes_csv:
    - "top_${top_genes}_genes.csv":
        type: file
        description: |
          CSV file with top differentially expressed genes
        pattern: "top_*_genes.csv"
        ontologies:
          - edam: "http://edamontology.org/format_3752"

  versions_limma:
    - - "${task.process}":
          type: string
          description: The name of the process
      - r_base:
          type: string
          description: The name of R programming language
      - "echo $(R --version 2>&1) | sed 's/^.*R version //; s/ .*$//'":
          type: eval
          description: The expression to obtain the version of R
      - bioconductor_limma:
          type: string
          description: The name of the limma package
      - 'Rscript -e "library(limma); cat(as.character(packageVersion(''limma'')))"':
          type: eval
          description: The expression to obtain the version of limma

topics:
  versions:
    - - "${task.process}":
          type: string
          description: The name of the process
      - r_base:
          type: string
          description: The name of R programming language
      - "echo $(R --version 2>&1) | sed 's/^.*R version //; s/ .*$//'":
          type: eval
          description: The expression to obtain the version of R
      - bioconductor_limma:
          type: string
          description: The name of the limma package
      - 'Rscript -e "library(limma); cat(as.character(packageVersion(''limma'')))"':
          type: eval
          description: The expression to obtain the version of limma

authors:
  - "@Loai3tr"
maintainers:
  - "@Loai3tr"
