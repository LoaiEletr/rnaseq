name: "kegg_enrichment"
description: |
  Performs comprehensive Kyoto Encyclopedia of Genes and Genomes (KEGG) enrichment analysis for multiple analysis types
  including differential expression, WGCNA modules, MaSigPro clusters, differential isoform
  usage, and differential exon usage. Supports multiple species through organism-specific
  annotation databases.
keywords:
  - kegg enrichment
  - functional analysis
  - genomics
  - clusterprofiler
tools:
  - bioconductor_clusterprofiler:
      description: "Statistical analysis and visualization of functional profiles for genes and gene clusters"
      homepage: "https://bioconductor.org/packages/clusterProfiler/"
      documentation: "https://bioconductor.org/packages/release/bioc/html/clusterProfiler.html"
      tool_dev_url: "https://github.com/YuLab-SMU/clusterProfiler"
      licence: ["Artistic-2.0"]
      identifier: "clusterProfiler"

input:
  - unfiltered_deg:
      type: file
      description: |
        RDS file with unfiltered differential expression results for KEGG analysis
      pattern: "*.rds"
      ontologies: []

  - pvalue_threshold:
      type: number
      description: |
        P-value threshold for significance in KEGG enrichment analysis
      pattern: "[0-9]+(\\.[0-9]+)?"

  - logfc_threshold:
      type: number
      description: |
        Log2 fold change threshold for filtering differential expression genes
      pattern: "[0-9]+(\\.[0-9]+)?"

  - species_name:
      type: string
      description: |
        Species name for organism-specific KEGG analysis
      pattern: "[a-zA-Z]+"

  - wgcna_list:
      type: file
      description: |
        RDS file containing WGCNA module results for module-specific KEGG enrichment
      pattern: "*.rds"
      ontologies: []

  - masigpro_list:
      type: file
      description: |
        RDS file containing MaSigPro temporal cluster results for cluster-specific KEGG enrichment
      pattern: "*.rds"
      ontologies: []

  - genes_diu:
      type: file
      description: |
        RDS file containing genes from differential isoform usage analysis for KEGG enrichment
      pattern: "*.rds"
      ontologies: []

  - genes_deu:
      type: file
      description: |
        RDS file containing genes from differential exon usage analysis for KEGG enrichment
      pattern: "*.rds"
      ontologies: []

  - ntop_processes:
      type: integer
      description: |
        Number of top KEGG pathways to display and save in results
      pattern: "[0-9]+"

output:
  kegg_results:
    - KEGG_results:
        type: file
        description: |
          Directory containing KEGG enrichment results including tables and visualization plots
        pattern: "KEGG_results/**"
        optional: true

  versions_kegg_enrichment:
    - - "${task.process}":
          type: string
          description: The name of the process
      - r_base:
          type: string
          description: The name of R programming language
      - "echo $(R --version 2>&1) | sed 's/^.*R version //; s/ .*$//'":
          type: eval
          description: The expression to obtain the version of R
      - bioconductor_clusterprofiler:
          type: string
          description: The name of the clusterProfiler package
      - 'Rscript -e "library(clusterProfiler); cat(as.character(packageVersion(''clusterProfiler'')))"':
          type: eval
          description: The expression to obtain the version of clusterProfiler
      - r_ggplot2:
          type: string
          description: The name of the ggplot2 package
      - 'Rscript -e "library(ggplot2); cat(as.character(packageVersion(''ggplot2'')))"':
          type: eval
          description: The expression to obtain the version of ggplot2
      - bioconductor_org_hs_eg_db:
          type: string
          description: The name of the Human annotation database package
      - 'Rscript -e "library(org.Hs.eg.db); cat(as.character(packageVersion(''org.Hs.eg.db'')))"':
