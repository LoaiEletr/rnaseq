repository_type: pipeline

nf_core_version: 3.5.1

lint:
  files_unchanged:
    - CODE_OF_CONDUCT.md
    - assets/nf-core-rnaseq_logo_light.png
    - docs/images/nf-core-rnaseq_logo_light.png
    - docs/images/nf-core-rnaseq_logo_dark.png
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/CONTRIBUTING.md
    - .github/PULL_REQUEST_TEMPLATE.md
    - assets/email_template.txt
    - docs/README.md
    - .github/CONTRIBUTING.md
    - assets/sendmail_template.txt
  nextflow_config:
    - manifest.name
    - manifest.homePage
  multiqc_config: false
  files_exist:
    - CODE_OF_CONDUCT.md
    - assets/nf-core-rnaseq_logo_light.png
    - docs/images/nf-core-rnaseq_logo_light.png
    - docs/images/nf-core-rnaseq_logo_dark.png
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/workflows/awstest.yml
    - .github/workflows/awsfulltest.yml
    - assets/multiqc_config.yml

template:
  org: LoaiEletr
  name: rnaseq
  description: A comprehensive RNA-Seq pipeline performing upstream analysis, differential
    exon/isoform usage, differential gene expression, WGCNA co-expression analysis,
    and functional enrichment
  author: Loai Eletr
  version: 1.0.0dev
  force: true
  outdir: .
  skip_features:
    - multiqc
    - fastqc
  is_nfcore: false
